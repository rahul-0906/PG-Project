# ─────────────────────────────────────────────────────────────────────────────
# Test Profile — active when SPRING_PROFILES_ACTIVE=test
# Guarantees a 100% empty, freshly created database on startup.
# Disables Flyway migrations and forces Hibernate to drop and recreate the schema.
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pgcrmdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:pgcrm123}
  jpa:
    database: POSTGRESQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create
  flyway:
    enabled: false
