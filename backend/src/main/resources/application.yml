spring:
  application:
    name: pg-crm
  config:
    import:
      - "classpath:tenant-config.yml"
      - "optional:file:./tenant-config.yml"
      - "optional:file:../tenant-config.yml"

  # ─── PostgreSQL (Active & Exclusive) ────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/pgcrmdb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: admin
    continue-on-error: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: true
    properties:
      hibernate:
        format_sql: true

  # ─── Email / Gmail SMTP ─────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-gmail@gmail.com}
    password: ${MAIL_PASSWORD:your-gmail-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
    default-encoding: UTF-8

  thymeleaf:
    cache: false
    mode: HTML

# ─── JWT ─────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForPGCRMAppThatShouldBeAtLeast256BitsForHS256}
    access-token-expiration: 900000       # 15 min
    refresh-token-expiration: 604800000   # 7 days
  mail:
    from: ${MAIL_FROM:noreply@pgcrm.com}
    from-name: ${pg.system.branding.name:PG CRM}
    enabled: ${MAIL_ENABLED:true}        # set true after configuring Gmail App Password

# ─── Razorpay ────────────────────────────────────────────────────
razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_SuLwO7L565iIkE}
  key-secret: ${RAZORPAY_KEY_SECRET:crxqdRsIIaL2gbti1Hg9cZgG}
  enabled: ${RAZORPAY_ENABLED:true}     # enabled with real keys

# ─── Twilio WhatsApp ─────────────────────────────────────────────
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:PLACEHOLDER_SID}
  auth-token: ${TWILIO_AUTH_TOKEN:PLACEHOLDER_TOKEN}
  whatsapp-from: ${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}
  enabled: ${TWILIO_ENABLED:true}

# ─── Server ──────────────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# ─── Logging ─────────────────────────────────────────────────────
logging:
  level:
    com.pgcrm: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
