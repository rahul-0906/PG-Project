# ─────────────────────────────────────────────────────────────────────────────
# Development Profile — active when SPRING_PROFILES_ACTIVE=dev
# Performs a clean wipe and recreation of the database schema on startup.
# WARNING: NEVER run this profile in production as it drops all tables!
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pgcrmdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    clean-disabled: false
    clean-on-startup: false

