# ─────────────────────────────────────────────────────────────────────────────
# Production Profile — active when SPRING_PROFILES_ACTIVE=prod
# Overrides the dev settings from application.yml with production PostgreSQL.
# All sensitive values are read from environment variables.
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pgcrmdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:pgcrm}
    password: ${DB_PASSWORD:pgcrm123}
    continue-on-error: false

  jpa:
    database: POSTGRESQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update   # Auto-create/update tables on startup
    show-sql: false

# ─── Production Logging ───────────────────────────────────────────────────────
logging:
  level:
    com.pgcrm: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
