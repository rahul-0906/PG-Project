# ─────────────────────────────────────────────────────────────────────────────
# Development Profile — active when SPRING_PROFILES_ACTIVE=dev
# Performs a clean wipe and recreation of the database schema on startup.
# WARNING: NEVER run this profile in production as it drops all tables!
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/controlplane_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
  flyway:
    clean-disabled: false
    clean-at-start: ${DB_WIPE_ON_STARTUP:false}
