server:
  port: 8090

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/controlplane_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

razorpay:
  key:
    id: rzp_test_mockKeyId12345
    secret: mockSecret
  webhook:
    secret: mockWebhookSecret

onboarding:
  setup-fee-inr: 15000
