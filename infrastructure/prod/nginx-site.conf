# ──────────────────────────────────────────────────────────────────────────────
# PG CRM NGINX REVERSE PROXY CONFIGURATION
# ──────────────────────────────────────────────────────────────────────────────

upstream backend_upstream {
    # Points to Spring Boot backend running on local port 8080
    server localhost:8080;
    keepalive 32;
}

upstream frontend_upstream {
    # Points to React Frontend local static server running on port 80
    # Note: If Nginx is serving the frontend directly, this upstream block 
    # can be replaced with a standard 'root' configuration.
    server localhost:80;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    
    # Update with your client's production and staging domain subdomains
    server_name portal.srisaipg.in uat.srisaipg.in;

    # Redirect all HTTP traffic to HTTPS (Recommended for Production)
    # return 301 https://$host$request_uri;

    # Max upload size for attachments / KYC documents
    client_max_body_size 10M;

    # ─── FRONTEND CONFIGURATION ──────────────────────────────────────────────
    # Route all root requests to the React Frontend (listening on localhost:80)
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSockets support (if hot reloading / hot dev features are active)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Enable client-side caching for assets
        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2)$ {
            access_log off;
            add_header Cache-Control "no-cache, public, must-revalidate, proxy-revalidate";
        }
    }

    # ─── BACKEND API CONFIGURATION ───────────────────────────────────────────
    # Route all API calls to the Spring Boot application (listening on localhost:8080)
    location /api {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings for long-running batch billing runs
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
